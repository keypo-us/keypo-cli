name: Foundry

on:
  push:
    paths:
      - "keypo-account/**"
      - ".github/workflows/foundry.yml"
  pull_request:
    paths:
      - "keypo-account/**"
      - ".github/workflows/foundry.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keypo-account

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: "1.5.1"

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv
